AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nextcloud High-Availability Deployment with Serverless Components (Aurora Serverless v2, ElastiCache Serverless, Fargate, S3)'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcId
          - PrivateSubnetIds
          - PublicSubnetIds
      - Label:
          default: "Database Configuration"
        Parameters:
          - DBPassword
          - DBMinCapacity
          - DBMaxCapacity
      - Label:
          default: "Application Configuration"
        Parameters:
          - NextcloudAdminUser
          - NextcloudAdminPassword
          - DomainName
          - CertificateArn
      - Label:
          default: "Scaling Configuration"
        Parameters:
          - MinTasks
          - MaxTasks
          - TaskCpu
          - TaskMemory

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs (at least 2 in different AZs)

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs for ALB (at least 2 in different AZs)

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 128
    Description: Database master password (min 16 characters)
    AllowedPattern: ^[a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]*$

  DBMinCapacity:
    Type: Number
    Default: 0.5
    AllowedValues: [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6, 6.5, 7, 7.5, 8]
    Description: Minimum Aurora Capacity Units (ACU)

  DBMaxCapacity:
    Type: Number
    Default: 16
    AllowedValues: [1, 2, 4, 8, 16, 32, 64, 128]
    Description: Maximum Aurora Capacity Units (ACU)

  NextcloudAdminUser:
    Type: String
    Default: admin
    Description: Nextcloud admin username

  NextcloudAdminPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Nextcloud admin password (min 8 characters)

  DomainName:
    Type: String
    Default: ""
    Description: Domain name for Nextcloud (optional, e.g., nextcloud.example.com)

  CertificateArn:
    Type: String
    Default: ""
    Description: ACM Certificate ARN for HTTPS (required if using custom domain)

  MinTasks:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Minimum number of Fargate tasks

  MaxTasks:
    Type: Number
    Default: 10
    MinValue: 2
    MaxValue: 100
    Description: Maximum number of Fargate tasks

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: Task CPU units (256=0.25 vCPU, 1024=1 vCPU)

  TaskMemory:
    Type: String
    Default: '2048'
    AllowedValues: ['512', '1024', '2048', '3072', '4096', '5120', '6144', '7168', '8192']
    Description: Task memory in MB

Conditions:
  UseCustomDomain: !Not [!Equals [!Ref DomainName, ""]]
  UseHTTPS: !Not [!Equals [!Ref CertificateArn, ""]]

Resources:
  # ==================== S3 Bucket ====================
  NextcloudS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'nextcloud-files-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: Nextcloud
        - Key: ManagedBy
          Value: CloudFormation

  # ==================== EFS for Config ====================
  NextcloudEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: nextcloud-config
        - Key: Application
          Value: Nextcloud

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref NextcloudEFS
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref NextcloudEFS
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # ==================== RDS Aurora Serverless v2 ====================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Nextcloud Aurora Subnet Group
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: nextcloud-db-subnet-group

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      EngineVersion: '15.17'
      DatabaseName: nextcloud
      MasterUsername: nextcloud
      MasterUserPassword: !Ref DBPassword
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'mon:04:00-mon:05:00'
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableCloudwatchLogsExports:
        - postgresql
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref DBMinCapacity
        MaxCapacity: !Ref DBMaxCapacity
      StorageEncrypted: true
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: nextcloud-aurora-cluster

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-aurora-1'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: nextcloud-aurora-instance-1

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-aurora-2'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: nextcloud-aurora-instance-2

  # ==================== Secrets Manager ====================
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}/db-password'
      Description: Nextcloud Database Password
      SecretString: !Ref DBPassword

  AdminPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}/admin-password'
      Description: Nextcloud Admin Password
      SecretString: !Ref NextcloudAdminPassword

  # ==================== ElastiCache Serverless Redis ====================
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Nextcloud Cache Subnet Group
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: nextcloud-cache-subnet-group

  RedisServerlessCache:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      ServerlessCacheName: !Sub '${AWS::StackName}-redis'
      Description: Nextcloud Redis Cache
      Engine: redis
      MajorEngineVersion: '7'
      CacheUsageLimits:
        DataStorage:
          Maximum: 10
          Unit: GB
        ECPUPerSecond:
          Maximum: 5000
      SecurityGroupIds:
        - !Ref CacheSecurityGroup
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: nextcloud-redis

  # ==================== Application Load Balancer ====================
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-alb'
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Tags:
        - Key: Name
          Value: nextcloud-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /status.php
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '86400'
      Tags:
        - Key: Name
          Value: nextcloud-target-group

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - !If
          - UseHTTPS
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UseHTTPS
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ==================== ECS Cluster ====================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: nextcloud-cluster

  # ==================== CloudWatch Logs ====================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}'
      RetentionInDays: 7

  # ==================== IAM Roles ====================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-task-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource:
                  - !Ref DBPasswordSecret
                  - !Ref AdminPasswordSecret

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                  - 's3:PutObjectAcl'
                Resource:
                  - !GetAtt NextcloudS3Bucket.Arn
                  - !Sub '${NextcloudS3Bucket.Arn}/*'

  # ==================== ECS Task Definition ====================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${AWS::StackName}-nextcloud'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: nextcloud
          Image: nextcloud:latest
          Essential: true
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          Environment:
            - Name: POSTGRES_HOST
              Value: !GetAtt AuroraCluster.Endpoint.Address
            - Name: POSTGRES_DB
              Value: nextcloud
            - Name: POSTGRES_USER
              Value: nextcloud
            - Name: REDIS_HOST
              Value: !GetAtt RedisServerlessCache.Endpoint.Address
            - Name: REDIS_HOST_PORT
              Value: !GetAtt RedisServerlessCache.Endpoint.Port
            - Name: OBJECTSTORE_S3_BUCKET
              Value: !Ref NextcloudS3Bucket
            - Name: OBJECTSTORE_S3_REGION
              Value: !Ref AWS::Region
            - Name: OBJECTSTORE_S3_SSL
              Value: 'true'
            - Name: OBJECTSTORE_S3_USEPATH_STYLE
              Value: 'false'
            - Name: NEXTCLOUD_ADMIN_USER
              Value: !Ref NextcloudAdminUser
            - Name: NEXTCLOUD_TRUSTED_DOMAINS
              Value: !If [UseCustomDomain, !Ref DomainName, !GetAtt LoadBalancer.DNSName]
            - Name: OVERWRITEPROTOCOL
              Value: !If [UseHTTPS, 'https', 'http']
            - Name: OVERWRITEHOST
              Value: !If [UseCustomDomain, !Ref DomainName, !GetAtt LoadBalancer.DNSName]
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: POSTGRES_PASSWORD
              ValueFrom: !Ref DBPasswordSecret
            - Name: NEXTCLOUD_ADMIN_PASSWORD
              ValueFrom: !Ref AdminPasswordSecret
          MountPoints:
            - SourceVolume: efs-config
              ContainerPath: /var/www/html/config
            - SourceVolume: efs-custom-apps
              ContainerPath: /var/www/html/custom_apps
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: nextcloud
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost/status.php || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Volumes:
        - Name: efs-config
          EFSVolumeConfiguration:
            FilesystemId: !Ref NextcloudEFS
            TransitEncryption: ENABLED
            AuthorizationConfig:
              IAM: DISABLED
        - Name: efs-custom-apps
          EFSVolumeConfiguration:
            FilesystemId: !Ref NextcloudEFS
            TransitEncryption: ENABLED
            AuthorizationConfig:
              IAM: DISABLED

  # ==================== ECS Service ====================
  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - HTTPListener
      - AuroraInstance1
      - RedisServerlessCache
    Properties:
      ServiceName: !Sub '${AWS::StackName}-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref MinTasks
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: nextcloud
          ContainerPort: 80
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 120
      Tags:
        - Key: Name
          Value: nextcloud-service

  # ==================== Auto Scaling ====================
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref MinTasks
      MaxCapacity: !Ref MaxTasks
      ResourceId: !Sub 'service/${ECSCluster}/${Service.Name}'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  ScalingPolicyCPU:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  ScalingPolicyMemory:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-memory-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 80.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ==================== Security Groups ====================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-alb-sg'
      GroupDescription: ALB Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere
        - !If
          - UseHTTPS
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
            Description: Allow HTTPS from anywhere
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: nextcloud-alb-sg

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-ecs-sg'
      GroupDescription: ECS Tasks Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTP from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: nextcloud-ecs-sg

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-db-sg'
      GroupDescription: RDS Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: Allow PostgreSQL from ECS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: nextcloud-db-sg

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-cache-sg'
      GroupDescription: Redis Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: Allow Redis from ECS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: nextcloud-cache-sg

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-efs-sg'
      GroupDescription: EFS Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup
          Description: Allow NFS from ECS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: nextcloud-efs-sg

Outputs:
  LoadBalancerDNS:
    Description: ALB DNS Name
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALB-DNS'

  LoadBalancerURL:
    Description: Nextcloud URL
    Value: !If
      - UseHTTPS
      - !Sub 'https://${LoadBalancer.DNSName}'
      - !Sub 'http://${LoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-URL'

  CustomDomainURL:
    Condition: UseCustomDomain
    Description: Custom Domain URL
    Value: !If
      - UseHTTPS
      - !Sub 'https://${DomainName}'
      - !Sub 'http://${DomainName}'

  DatabaseEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DB-Endpoint'

  DatabasePort:
    Description: Aurora Cluster Port
    Value: !GetAtt AuroraCluster.Endpoint.Port
    Export:
      Name: !Sub '${AWS::StackName}-DB-Port'

  RedisEndpoint:
    Description: Redis Primary Endpoint
    Value: !GetAtt RedisServerlessCache.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-Redis-Endpoint'

  RedisPort:
    Description: Redis Port
    Value: !GetAtt RedisServerlessCache.Endpoint.Port
    Export:
      Name: !Sub '${AWS::StackName}-Redis-Port'

  S3Bucket:
    Description: S3 Bucket for Files
    Value: !Ref NextcloudS3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-S3-Bucket'

  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref NextcloudEFS
    Export:
      Name: !Sub '${AWS::StackName}-EFS-ID'

  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-Cluster'

  ECSServiceName:
    Description: ECS Service Name
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub '${AWS::StackName}-Service'

  AdminUser:
    Description: Nextcloud Admin Username
    Value: !Ref NextcloudAdminUser

  NextSteps:
    Description: Next Steps
    Value: !Sub |
      1. Access Nextcloud at: ${LoadBalancer.DNSName}
      2. Login with username: ${NextcloudAdminUser}
      3. Password is stored in Secrets Manager: ${AdminPasswordSecret}
      4. Configure DNS (optional): Point ${DomainName} to ${LoadBalancer.DNSName}
      5. Monitor: Check CloudWatch dashboard for metrics
